# TODO: add task types
# TODO: decide a better way of marking a guard_value as unnecessary instead of -1
#
# period 0 means task is of type old
# guard value must not be -1 if it's necessary for calculation

transitions:
  # 0 -> 1   MODE_INIT -> MODE_EMERGENCY
  - trans_id: 0
    source_mode: 0
    dest_mode: 1
    taskset:
      - task_id: 0 # changed
        primitives:
          action: "ACTION_UPDATE"
          guard: "GUARD_OFFSETLR"
          guard_value: 500
      - task_id: 1 # old
        primitives:
          action: "ACTION_SUSPEND"
          guard: "GUARD_BACKLOG_ZERO"
          guard_value: -1

  # 1 -> 0   MODE_EMERGENCY -> MODE_INIT
  - trans_id: 1
    source_mode: 1
    dest_mode: 0
    taskset:
      - task_id: 0 # changed
        primitives:
          action: "ACTION_UPDATE"
          guard: "GUARD_OFFSETMCR"
          guard_value: 3000
      - task_id: 1 # new
        primitives: 
          action: "ACTION_RELEASE"
          guard: "GUARD_BACKLOG_GLOBAL"
          guard_value: -1



tasks:
  - id: 0
    name: "taskZero"

  - id: 1
    name: "taskOne"


modes:
  - id: 0
    name: "MODE_INIT"
    active_tasks:
      - id: 0
        parameters:
          period: 2000
          priority: 10
      - id: 1
        parameters:
          period: 750
          priority: 10
  - id: 1
    name: "MODE_EMERGENCY"
    active_tasks:
      - id: 0
        parameters:
          period: 500
          priority: 10
